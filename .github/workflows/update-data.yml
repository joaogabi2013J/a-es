name: Atualizar dados B3

on:
  schedule:
    # A cada 30 min em dias úteis, horário de mercado (12h-21h UTC = 9h-18h Brasília)
    - cron: '*/30 12-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Buscar dados B3
        run: |
          pip install requests
          git clone --depth=1 --branch=main ${{ github.server_url }}/${{ github.repository }} /tmp/repo
          python /tmp/repo/scripts/fetch-b3-data.py data

      - name: Commit e push dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: atualizar dados B3 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
